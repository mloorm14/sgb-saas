version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sgb_postgres
    environment:
      POSTGRES_DB: sgb_db
      POSTGRES_USER: sgb_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgb_user -d sgb_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sgb_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend-springboot
    container_name: sgb_backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/sgb_db
      DB_USER: sgb_user
      DB_PASSWORD: changeme
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend-angular
    container_name: sgb_frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
