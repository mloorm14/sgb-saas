<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f5f5">
  <div style="background:white;padding:2rem;border-radius:8px;width:100%;max-width:400px;box-shadow:0 2px 8px rgba(0,0,0,0.1)">

    <h2 style="text-align:center;margin-bottom:1.5rem;color:#005c2f">SGB-SaaS — Registro</h2>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <div style="margin-bottom:1rem">
        <label style="display:block;margin-bottom:4px;font-size:14px">Nombre completo</label>
        <input
          formControlName="nombre"
          type="text"
          placeholder="Tu nombre"
          style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;box-sizing:border-box"
        />
        <small style="color:red" *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched">
          El nombre debe tener al menos 3 caracteres
        </small>
      </div>

      <div style="margin-bottom:1rem">
        <label style="display:block;margin-bottom:4px;font-size:14px">Correo electrónico</label>
        <input
          formControlName="correo"
          type="email"
          placeholder="ejemplo@uteq.edu.ec"
          style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;box-sizing:border-box"
        />
        <small style="color:red" *ngIf="form.get('correo')?.invalid && form.get('correo')?.touched">
          Ingrese un correo válido
        </small>
      </div>

      <div style="margin-bottom:1rem">
        <label style="display:block;margin-bottom:4px;font-size:14px">Contraseña</label>
        <input
          formControlName="password"
          type="password"
          placeholder="Mínimo 6 caracteres"
          style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font-size:14px;box-sizing:border-box"
        />
        <small style="color:red" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          La contraseña debe tener al menos 6 caracteres
        </small>
      </div>

      <div *ngIf="errorMsg" style="color:red;font-size:13px;margin-bottom:1rem">
        {{ errorMsg }}
      </div>

      <div *ngIf="exitoMsg" style="color:green;font-size:13px;margin-bottom:1rem">
        {{ exitoMsg }}
      </div>

      <button
        type="submit"
        [disabled]="form.invalid || cargando"
        style="width:100%;padding:10px;background:#005c2f;color:white;border:none;border-radius:4px;font-size:15px;cursor:pointer">
        {{ cargando ? 'Registrando...' : 'Registrarse' }}
      </button>

      <p style="text-align:center;margin-top:1rem;font-size:13px">
        ¿Ya tienes cuenta? <a routerLink="/login" style="color:#005c2f">Inicia sesión aquí</a>
      </p>

    </form>
  </div>
</div>
